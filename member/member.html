<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>凱旋旅行社會員登入 - 此團尚未出發</title>
    <link rel="shortcut icon" href="https://www.artisan.com.tw/images/artisan.ico" />
    <link rel="stylesheet" type="text/css" href="./css/layout_2024.css" />
    <link rel="stylesheet" href="./css/normalize.css" />
    <script src="js/jquery-1.12.4.min.js" type="text/javascript"></script>
    <link rel="stylesheet" href="./css/member2025.css" />
    <link rel="stylesheet" type="text/css" href="./css/fonts.css" />
    <link rel="stylesheet" type="text/css" href="./css/all.new.min.css" />
  </head>
  <body>
    <form name="form1" method="post" action="./Member2.aspx" id="form1">
      <div id="content">
        <div class="container" id="content_member">
          <div class="form-imfo">
            <div class="member-box">
              <div class="row">
                <!-- 左側登入表單 -->
                <div class="member-box-left">
                  <div class="logo"><h1>團員登入</h1></div>
                  <div class="form-group">
                    <label for="txbSN">帳號</label>
                    <div class="input-with-icon">
                      <i class="fas fa-user"></i>
                      <input type="text" id="txbSN" class="form-control" placeholder="帳號預設為身分證字號" />
                    </div>
                    <div class="status-message" id="statusMessageSN"></div>
                  </div>

                  <div class="form-group">
                    <label for="txbPW">密碼</label>
                    <div class="input-with-icon">
                      <i class="fas fa-lock"></i>
                      <input type="password" id="txbPW" class="form-control" placeholder="密碼預設為西元出生年月日" />
                    </div>
                    <div class="status-message" id="statusMessagePW"></div>
                  </div>

                  <button type="button" id="loginBtn" class="submit-btn">登入</button>
                </div>

                <!-- 右側說明與狀態訊息 -->
                <div class="member-box-right">
                  <p>
                    * 帳號預設為<span class="style_member_strong">身分證字號</span><br />
                    * 密碼預設為<span class="style_member_strong">西元出生年月日</span>，ex：出生日為1950年 1月2日，請輸入：19500102<br />
                    <span class="p-dashed-line"></span>
                    ※嚴格保護每一位客人的個人資料，未經客人同意絕不對外揭露!並遵守法律上權利責任規範。<br />
                  </p>

                  <a class="material" href="http://www.artisan.com.tw/Notes.aspx">個人資料保護說明</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </form>

    <!-- Modal -->
    <div id="statusModal" class="modal">
      <div class="modal-content">
        <div id="modalMessage"></div>
        <button class="modal-close" id="modalClose">關閉</button>
      </div>
    </div>

    <script>
      /* ==================================================
   共用 Modal 控制
================================================== */
      const modal = document.getElementById("successModal");
      const closeBtn = document.getElementById("closeBtn");

      const submitBtn = document.getElementById("submitBtn");
      const form = document.getElementById("form1");

      let iframe = document.createElement("iframe");
      iframe.name = "hidden_iframe";
      iframe.style.display = "none";
      document.body.appendChild(iframe);
      form.target = "hidden_iframe";

      submitBtn?.addEventListener("click", function (e) {
        e.preventDefault();

        // 清除錯誤
        document.querySelectorAll(".question_list").forEach((el) => {
          el.classList.remove("error");
          el.querySelector(".required-text")?.remove();
        });

        let isValid = true;
        const requiredBlocks = form.querySelectorAll(".question_list.required");

        requiredBlocks.forEach((block) => {
          const inputs = block.querySelectorAll("input, textarea");
          let hasValue = false;

          inputs.forEach((input) => {
            if ((input.type === "radio" || input.type === "checkbox") && input.checked) {
              hasValue = true;
            } else if (input.type !== "radio" && input.type !== "checkbox" && input.value.trim() !== "") {
              hasValue = true;
            }
          });

          if (!hasValue) {
            isValid = false;
            block.classList.add("error");

            const title = block.querySelector(".q-title");
            if (title && !title.querySelector(".required-text")) {
              const span = document.createElement("span");
              span.className = "required-text";
              span.textContent = "*必填";
              span.style.color = "red";
              span.style.fontSize = "13px";
              span.style.marginLeft = "6px";
              title.appendChild(span);
            }
          }
        });

        const agree = document.getElementById("CheckBox1");
        if (agree && !agree.checked) {
          alert("請先閱讀須知並同意");
          return;
        }

        if (!isValid) {
          document.querySelector(".question_list.error")?.scrollIntoView({
            behavior: "smooth",
            block: "center",
          });
          return;
        }

        submitBtn.innerText = "送出中...";
        submitBtn.classList.add("loading");

        try {
          form.submit();
        } catch (err) {
          alert("表單送出失敗，請稍後再試");
          submitBtn.innerText = "送出";
          submitBtn.classList.remove("loading");
          return;
        }

        iframe.onload = function () {
          modal.style.display = "flex";
          document.getElementById("modalMessage").innerHTML = "送出成功！";
          submitBtn.innerText = "送出";
          submitBtn.classList.remove("loading");
          form.reset();
          document.querySelectorAll(".required-text").forEach((el) => el.remove());
        };

        iframe.onerror = function () {
          alert("表單送出失敗，請稍後再試");
          submitBtn.innerText = "送出";
          submitBtn.classList.remove("loading");
        };
      });

      $(function () {
        $("#loginBtn").on("click", function () {
          var account = $("#txbSN").val().trim();
          var password = $("#txbPW").val().trim();

          $("#statusMessageSN").text("");
          $("#statusMessagePW").text("");

          let hasError = false;

          // 身分證驗證
          var idPattern = /^[A-Z][12]\d{8}$/i;
          if (account === "") {
            $("#statusMessageSN").text("請輸入帳號");
            hasError = true;
          } else if (!idPattern.test(account)) {
            $("#statusMessageSN").text("帳號格式錯誤");
            hasError = true;
          }

          // 生日驗證
          var datePattern = /^(19|20)\d{2}(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])$/;
          if (password === "") {
            $("#statusMessagePW").text("請輸入密碼");
            hasError = true;
          } else if (!datePattern.test(password)) {
            $("#statusMessagePW").text("密碼格式錯誤（YYYYMMDD）");
            hasError = true;
          }

          if (hasError) return;

          /* ===========================
       狀態判斷（3種情境）
    =========================== */
          var groupNotDeparted = false;
          var returnedOverMonth = false;

          let msg = "";

          if (groupNotDeparted) {
            msg = "此團尚未出發";
          } else if (returnedOverMonth) {
            msg = "感謝您的意見回饋<br>期待下次再相逢";
          } else {
            msg = "登入成功！";
          }

          $("#modalMessage").html(msg);
          modal.style.display = "flex";
        });
      });

      closeBtn?.addEventListener("click", () => {
        modal.style.display = "none";
      });

      $("#statusModal").on("click", function (e) {
        if (e.target === this) $(this).hide();
      });
    </script>
  </body>
</html>
